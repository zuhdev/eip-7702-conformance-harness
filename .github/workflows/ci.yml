name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compatibility-suite:
    name: Managed-Anvil compatibility run
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install solc
        env:
          SOLC_VERSION: 0.8.34
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          curl -sSL -o "$HOME/.local/bin/solc" \
            "https://github.com/ethereum/solidity/releases/download/v${SOLC_VERSION}/solc-static-linux"
          chmod +x "$HOME/.local/bin/solc"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/solc" --version

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run check

      - name: Run compatibility suite
        run: npm run prototype

      - name: Upload compatibility report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compatibility-report
          path: reports/latest/
          if-no-files-found: warn
